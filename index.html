<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanis Gougaud – Portfolio</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>

    <!-- Scanlines -->
    <div class="scanlines"></div>

    <div class="container">

        <!-- TEXTE INTRO -->
        <h1 class="typewriter" id="intro-text">
            Bienvenue dans l'univers de Yanis.
        </h1>

        <!-- LIGNE D'ÉTAT -->
        <div class="status-line">
            <div id="loading-text">Chargement du portfolio...</div>
            <div id="success-text">Portfolio chargé avec succès.</div>
        </div>

        <!-- LOADER -->
        <div class="loader" id="intro-loader"></div>

        <!-- MENU -->
        <div class="menu hidden" id="main-menu">

            <!-- Bouton principal -->
            <a id="btn-presentation" class="main-btn">
                Présentation & CV
            </a>

            <!-- Boutons secondaires -->
            <div class="menu-row">
                <a id="btn-projets">Projets</a>
                <a id="btn-competences">Compétences</a>
                <a id="btn-contact">Contact</a>
            </div>

        </div>

    </div>

    <!-- SCRIPT TRANSITIONS -->
    <script src="../transition.js"></script>

    <!-- SCRIPT INTRO (plus rapide) -->
    <script>
        setTimeout(() => {
            document.getElementById("intro-loader").classList.add("hide");
            document.getElementById("loading-text").classList.add("hide");
            document.getElementById("success-text").classList.add("show");
        }, 2500);
    </script>

</body>
</html>
