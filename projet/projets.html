<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets – Yanis</title>
    <link rel="stylesheet" href="projets.css">
</head>
<body>

    <div class="matrix-bg"></div>
    <div class="scanlines"></div>

    <div class="container">
        <h1 class="title">> Décryptage des Projets</h1>
        <p class="subtitle">Neutralise les paquets corrompus pour débloquer chaque projet.</p>

        <div class="projects">

            <!-- PROJET 1 -->
            <div class="project" data-link="projet1.html" data-score="4" data-word="UNITY">
                <div class="header-line">
                    <span>[ PROJET 1 ]</span>
                    <span class="status">Score : 0 / 4</span>
                </div>

                <div class="firewall"></div>
                <div class="game-area"></div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <button class="btn-decrypt" disabled>Décrypter</button>
            </div>

            <!-- PROJET 2 -->
            <div class="project" data-link="projet2.html" data-score="8" data-word="FLUTTER">
                <div class="header-line">
                    <span>[ PROJET 2 ]</span>
                    <span class="status">Score : 0 / 4</span>
                </div>

                <div class="firewall"></div>
                <div class="game-area"></div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <button class="btn-decrypt" disabled>Décrypter</button>
            </div>

            <!-- PROJET 3 -->
            <div class="project" data-link="projet3.html" data-score="12" data-word="PYTHON">
                <div class="header-line">
                    <span>[ PROJET 3 ]</span>
                    <span class="status">Score : 0 / 4</span>
                </div>

                <div class="firewall"></div>
                <div class="game-area"></div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <button class="btn-decrypt" disabled>Décrypter</button>
            </div>

        </div>

        <a href="/index.html" class="back">Retour</a>
    </div>

    <script src="projets.js"></script>
</body>
</html>
